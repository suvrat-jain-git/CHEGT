# ──────────────────────────────────────────────
# CHEGT  |  Model Architecture Configuration
# ──────────────────────────────────────────────

backbone:
  name: dinov2_vitb14          # dinov2_vits14 | dinov2_vitb14 | dinov2_vitl14
  pretrained: true
  freeze_layers: 8             # freeze first N transformer blocks (0 = none, -1 = all)
  output_dim: 768              # ViT-B/14 CLS-token dim

temporal:
  num_frames: 16               # T: frames sampled per sequence
  d_model: 768                 # must match backbone.output_dim
  nhead: 8
  num_layers: 4
  dim_feedforward: 2048
  dropout: 0.1
  max_seq_len: 64
  pos_encoding: sinusoidal     # sinusoidal | learned

evidence:
  d_model: 768                 # input dim (from temporal transformer)
  motion:
    enabled: true
    hidden_dim: 512
    output_dim: 256
  appearance:
    enabled: true
    hidden_dim: 512
    output_dim: 256
  consistency:
    enabled: true
    hidden_dim: 512
    output_dim: 256

graph:
  num_nodes: 3                 # motion | appearance | consistency
  d_model: 256                 # must match evidence.*.output_dim
  nhead: 4
  num_layers: 2
  dim_feedforward: 1024
  dropout: 0.1

pooling:
  type: attention              # attention | mean | max
  d_model: 256                 # must match graph.d_model
  hidden_dim: 256

head:
  input_dim: 256               # must match pooling.d_model
  hidden_dim: 512
  embedding_dim: 512
  normalize: true
  dropout: 0.1
