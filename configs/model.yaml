# ──────────────────────────────────────────────
# CHEGT  |  Model Architecture Configuration
# ──────────────────────────────────────────────

backbone:
  name: dinov2_vitb14
  pretrained: true
  freeze_layers: 8
  output_dim: 768
  grid_h: 16          # 224 / 14 = 16 patch rows
  grid_w: 8           # 112 / 14 = 8  patch cols

temporal:
  num_frames: 16
  d_model: 768
  nhead: 8
  num_layers: 4
  dim_feedforward: 2048
  dropout: 0.1
  max_seq_len: 64
  pos_encoding: sinusoidal

evidence:
  d_model: 768
  motion:
    enabled: true
    hidden_dim: 512
    output_dim: 256
  appearance:
    enabled: true
    hidden_dim: 512
    output_dim: 256
  morphology:
    enabled: true
    hidden_dim: 512
    output_dim: 256
    patch_dim: 768
    num_patches: 128   # 16 × 8

graph:
  num_nodes: 3
  d_model: 256
  nhead: 4
  num_layers: 2
  dim_feedforward: 1024
  dropout: 0.1

pooling:
  type: mean           # mean | attention | max
  d_model: 256
  hidden_dim: 256

head:
  input_dim: 256
  hidden_dim: 512
  embedding_dim: 512
  normalize: true
  dropout: 0.1
