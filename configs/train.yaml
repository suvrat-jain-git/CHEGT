experiment:
  name: chegt_base
  seed: 42
  output_dir: runs/
  log_dir: runs/logs/
  resume: null

optimizer:
  name: adamw
  lr: 3.0e-4
  weight_decay: 1.0e-4
  backbone_lr_multiplier: 0.05
  betas: [0.9, 0.999]
  eps: 1.0e-8

scheduler:
  name: cosine_warmup
  warmup_epochs: 5
  min_lr: 1.0e-5

training:
  epochs: 30
  num_workers: 8
  gradient_clip: 1.0
  mixed_precision: true
  num_iters_per_epoch: 300

sampler:
  P: 16
  K: 4

loss:
  triplet:
    margin: 0.4
    mining: hard
    weight: 1.0
  arcface:
    margin: 0.5
    scale: 64.0
    weight: 1.0
    easy_margin: false

evaluation:
  interval: 5
  ranks: [1, 5, 10, 20]
  compute_eer: true

checkpoint:
  save_interval: 10
  keep_last: 5

visualization:
  interval: 20
  num_vis_samples: 512
